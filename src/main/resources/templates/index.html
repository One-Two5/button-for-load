<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>File Import</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Импорт файла</h1>

  <form th:action="@{/import}" method="post">
    <button type="submit" class="btn btn-primary">Запустить загрузку</button>
  </form>

  <div class="mt-4" th:if="${result != null}">
    <div class="alert alert-info" th:text="${result.message}"></div>
  </div>
</div>
</body>
</html>
